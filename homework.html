<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@600;700&display=swap" rel="stylesheet"><link rel="manifest" href="manifest.json"><link rel="icon" type="image/png" sizes="192x192" href="assets/icons/dreamers-192.png"><link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png"><meta name="theme-color" content="#ffd54f"><link rel="stylesheet" href="style.css"><title>Homework</title></head><body data-page="homework">
<div class="floating-shapes"></div>
<header class="top-shell subpage-top-shell top-shell-inline"><div class="header-left"><a class="back-link top-home-link" href="index.html"><span data-i18n="homeBtn">⬅ Home</span></a></div><div class="header-center"><div class="teacher-topline" data-i18n="teacherTopline">Dr. Tarek 01032188008</div></div><div class="header-right"><a class="tiny-admin-link" href="admin.html" title="Teacher Area">★</a></div></header>
<main class="container page-wrap">
  <section class="card setup-card" id="homeworkStartCard">
    <div class="setup-grid">
      <div class="homework-entry-grid">
        <div class="homework-intro-column">
          <span class="badge-pill" data-i18n="homeworkBadge">Homework</span>
          <h1 data-i18n="homeworkPageTitle">Homework With Dr. Tarek</h1>
          <p data-i18n="homeworkPageText">Choose your grade and class to open available homework.</p>
          <div class="student-form-box">
            <input id="homeworkStudentId" placeholder="Student ID" maxlength="40">
            <input id="homeworkStudentPin" placeholder="PIN" maxlength="10" type="password">
            <button class="main-btn" id="loadHomeworkBtn" type="button">Verify & Show Homework</button>
            <div id="homeworkVerifiedBox" class="muted-note"></div>
            <div id="homeworkStatus" class="muted-note"></div>
          </div>
        </div>
        <div class="homework-list-column">
          <span class="badge-pill secondary" data-i18n="availableHomeworkLabel">Available Homework</span>
          <div id="homeworkAvailableList" class="stored-questions question-editor-list"></div>
        </div>
      </div>
    </div>
  </section>
  <section id="homeworkQuizSection" class="hidden">
    <div class="status-grid">
      <div class="status-card card"><span data-i18n="studentLabel">Student</span><strong id="homeworkStudentPreview">-</strong></div>
      <div class="status-card card"><span data-i18n="homeworkBadge">Homework</span><strong id="homeworkTitlePreview">-</strong></div>
      <div class="status-card card"><span data-i18n="questionLabel">Question</span><strong id="homeworkQuestionProgress">1 / 1</strong></div>
      <div class="status-card card timer-card"><span data-i18n="timeLeft">Time Left</span><strong id="homeworkTimerValue">-</strong></div>
      <div class="status-card card"><span data-i18n="answeredLabel">Answered</span><strong id="homeworkAnsweredValue">0</strong></div>
    </div>
    <section class="card quiz-card-main">
      <div class="quiz-badges"><span class="badge-pill small" id="homeworkClassBadge"></span><span class="badge-pill small secondary" id="homeworkDateBadge"></span></div>
      <h2 id="homeworkQuestionText">Question</h2>
      <div class="homework-question-media-wrap hidden" id="homeworkQuestionMediaWrap"><img id="homeworkQuestionImage" class="homework-question-image" alt="Question image"></div>
      <div id="homeworkOptionsWrap" class="options-grid"></div>
      <div class="next-row"><button class="main-btn" id="homeworkNextBtn" type="button" data-i18n="nextQuestion">Next Question</button></div>
    </section>
  </section>
  <section id="homeworkDoneSection" class="card hidden">
    <h2 data-i18n="homeworkSubmittedTitle">Homework submitted</h2>
    <p id="homeworkDoneText" data-i18n="homeworkSubmittedText">Your homework has been sent.</p>
    <a class="main-btn" href="homework.html" data-i18n="openAnotherHomework">Open another homework</a>
  </section>
</main>
<script src="student-cloud-client.js"></script><script src="js/app-core.js"></script><script src="homework.js"></script></body></html>
