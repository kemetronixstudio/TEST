<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@600;700&display=swap" rel="stylesheet"><link rel="manifest" href="manifest.json"><link rel="icon" type="image/png" sizes="192x192" href="assets/icons/dreamers-192.png"><link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png"><meta name="theme-color" content="#ffd54f"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="remove-empty-box.css"><title>Parent Dashboard</title></head><body data-page="parent">
<div class="floating-shapes"></div>
<header class="top-shell subpage-top-shell top-shell-inline"><div class="header-left"><a class="back-link top-home-link" href="index.html"><span>⬅ Home</span></a></div><div class="header-center"><div class="teacher-topline">Dr. Tarek 01032188008</div></div><div class="header-right"></div></header>
<main class="container page-wrap">
  <section class="card setup-card">
    <div class="homework-entry-grid">
      <div class="homework-intro-column">
        <span class="badge-pill secondary">Parent</span>
        <h1>Parent Dashboard</h1>
        <p class="lead">Enter the student's ID and PIN to view homework history and results.</p>
        <div class="student-form-box">
          <input id="parentStudentId" placeholder="Student ID" maxlength="40">
          <input id="parentStudentPin" placeholder="PIN" type="password" maxlength="10">
          <button class="main-btn" id="loadParentDashboardBtn" type="button">Open Dashboard</button>
          <div id="parentStatus" class="muted-note"></div>
        </div>
      </div>
      <div class="homework-list-column">
        <span class="badge-pill">Student Summary</span>
        <div class="admin-top-grid mini-metrics parent-metrics">
          <div class="card metric-card"><span>Student</span><strong id="parentStudentName">-</strong></div>
          <div class="card metric-card"><span>Average</span><strong id="parentAverage">0%</strong></div>
          <div class="card metric-card"><span>Best</span><strong id="parentBest">0%</strong></div>
          <div class="card metric-card"><span>Submissions</span><strong id="parentTotal">0</strong></div>
        </div>
      </div>
    </div>
  </section>

  <section class="card admin-table-card">
    <div class="section-head"><h2>Homework History</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Homework</th><th>Score</th><th>Percent</th><th>Wrong</th></tr></thead>
        <tbody id="parentHistoryBody"><tr><td colspan="5">No records yet.</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<script src="student-cloud-client.js"></script><script src="js/app-core.js"></script><script src="parent.js"></script></body></html>
