
<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz</title><link rel="stylesheet" href="style.css">
</head><body data-page="quiz">
<div class="page wrap">
  <div class="topbar">
    <a class="ghost-btn home-link" href="index.html" data-i18n="home">Home</a>
    <div class="teacher" data-i18n="teacher">Dr. TAREK ABDALAZIZ 📞 01032188008</div>
    <div class="lang"><button class="active" id="langEn">EN</button><button id="langAr">AR</button></div>
  </div>

  <div id="startWrap" class="card">
    <div class="section-head"><div><span class="badge" id="quizBadge">KG</span><h2 id="quizTitle">Quiz</h2></div></div>
    <div class="form-grid">
      <input id="studentName" data-ph="studentName" placeholder="Student name">
    </div>
    <div class="small" data-i18n="chooseLevel">Choose level</div>
    <div class="toolbar" id="levelsWrap"></div>
    <div class="actions">
      <button class="main-btn" id="startQuizBtn" data-i18n="start">Start</button>
    </div>
  </div>

  <div id="quizWrap" class="hidden wrap">
    <div class="status-grid">
      <div class="card status-card"><span data-i18n="student">Student</span><strong id="studentLabel">-</strong></div>
      <div class="card status-card"><span data-i18n="question">Question</span><strong id="questionLabel">1 / 10</strong></div>
      <div class="card status-card"><span data-i18n="score">Score</span><strong id="scoreLabel">0</strong></div>
      <div class="card status-card"><span data-i18n="time">Time</span><strong id="timeLabel">15</strong></div>
    </div>
    <div class="progress-line"><div id="progressFill"></div></div>
    <div class="card question-box">
      <div class="section-head"><span class="badge" id="questionType">choice</span><button class="ghost-btn" id="readBtn">🔊 Read</button></div>
      <h2 id="questionText"></h2>
      <img id="questionImage" class="hidden" alt="question image">
      <div id="answersBox"></div>
      <div class="actions" style="margin-top:14px">
        <button class="main-btn" id="submitBtn" data-i18n="next">Next</button>
      </div>
    </div>
  </div>

  <div id="resultWrap" class="hidden card">
    <h2>Result</h2>
    <div class="status-grid">
      <div class="card status-card"><span data-i18n="score">Score</span><strong id="finalScore">0</strong></div>
      <div class="card status-card"><span>Percent</span><strong id="finalPercent">0%</strong></div>
    </div>
    <p id="resultAdvice" class="notice"></p>
    <div class="actions">
      <button class="main-btn" id="certificateBtn">Certificate</button>
      <a class="ghost-btn" href="index.html">Home</a>
    </div>
  </div>
</div>
<script type="module">
import { setLang, getLang } from './ui.js';
import { initQuiz } from './core.js';
document.getElementById('langEn').onclick=()=>{setLang('en');location.reload();};
document.getElementById('langAr').onclick=()=>{setLang('ar');location.reload();};
if(getLang()==='ar'){document.getElementById('langAr').classList.add('active');document.getElementById('langEn').classList.remove('active');}
initQuiz();
</script>
</body></html>
