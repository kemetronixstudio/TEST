
<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Certificate</title><link rel="stylesheet" href="style.css">
</head><body data-page="certificate">
<div class="page wrap">
  <div class="topbar">
    <a class="ghost-btn home-link" href="index.html" data-i18n="home">Home</a>
    <div class="teacher" data-i18n="teacher">Dr. TAREK ABDALAZIZ 📞 01032188008</div>
    <div class="lang"><button class="active" id="langEn">EN</button><button id="langAr">AR</button></div>
  </div>
  <div id="certificateArea" class="cert">
    <div class="watermark">STAR</div>
    <h1 id="certTitle">Certificate of Achievement</h1>
    <p style="text-align:center" class="small">Proudly presented to</p>
    <h2 style="text-align:center;font-size:2rem;margin:8px 0" id="certStudent">Student</h2>
    <p style="text-align:center" id="certResult">Excellent</p>
    <div class="cert-grid">
      <div class="cert-box"><strong>Grade</strong><div id="certGrade"></div></div>
      <div class="cert-box"><strong>Level</strong><div id="certLevel"></div></div>
      <div class="cert-box"><strong>Score</strong><div id="certScore"></div></div>
      <div class="cert-box"><strong>Date</strong><div id="certDate"></div></div>
      <div class="cert-box"><strong>Strengths</strong><div id="certStrengths"></div></div>
      <div class="cert-box"><strong>Focus More On</strong><div id="certWeak"></div></div>
      <div class="cert-box" style="grid-column:1/-1"><strong>Teacher Advice</strong><div id="certAdvice"></div></div>
    </div>
    <div class="actions" style="justify-content:space-between;align-items:center;margin-top:18px">
      <img src="DREAMERS.png" alt="logo" style="width:150px;height:auto">
      <div id="qrBox" class="qr-box"></div>
    </div>
  </div>
  <div class="actions">
    <button class="main-btn" id="downloadPdfBtn">Download PDF</button>
    <button class="ghost-btn" id="shareBtn">Share</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { setLang, getLang } from './ui.js';
import { initCertificate } from './certificate.js';
document.getElementById('langEn').onclick=()=>{setLang('en');location.reload();};
document.getElementById('langAr').onclick=()=>{setLang('ar');location.reload();};
if(getLang()==='ar'){document.getElementById('langAr').classList.add('active');document.getElementById('langEn').classList.remove('active');}
initCertificate();
</script>
</body></html>
